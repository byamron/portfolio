[build]
  command = "npm run build"
  publish = "dist"

# Cache hashed Vite output (JS/CSS) — immutable, safe to cache indefinitely
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images and fonts — long-lived, revalidate on deploy
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache resume PDF
[[headers]]
  for = "/ben-yamron-resume.pdf"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
