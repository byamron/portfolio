name: Update GitHub Contributions

on:
  schedule:
    - cron: '0 6 * * *' # Daily at 6am UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Fetch contribution data
        run: npx tsx scripts/fetch-contributions.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GH_CONTRIBUTIONS_TOKEN }}

      - name: Commit if changed
        run: |
          git diff --quiet src/data/contributions.json && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/contributions.json
          git commit -m "Update contribution data"
          git push
